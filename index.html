<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Cricket Live</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    margin:0;
}

.header{
    background:#000;
    color:gold;
    padding:20px;
    font-size:30px;
    font-weight:bold;
}

.live{
    color:red;
    font-size:18px;
}

.score-box{
    margin-top:30px;
}

.score{
    font-size:55px;
    color:gold;
}

.overs{
    font-size:25px;
}

button{
    padding:12px 18px;
    margin:6px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
🏏 CB Cricket Live
<br>
<span class="live">● LIVE</span>
</div>

<div class="score-box">
<h2>Team A vs Team B</h2>

<div class="score" id="score">0/0</div>

<div class="overs">
Overs: <span id="overs">0.0</span>
</div>
</div>

<br>

<button onclick="addRun(1)">+1</button>
<button onclick="addRun(2)">+2</button>
<button onclick="addRun(3)">+3</button>
<button onclick="dotBall()">0</button>
<button onclick="addRun(4)">Four</button>
<button onclick="addRun(6)">Six</button>
<button onclick="wideBall()">Wide</button>
<button onclick="noBall()">No Ball</button>
<button onclick="wicket()">Wicket</button>
<button onclick="resetMatch()">Reset</button>
<button onclick="runOut(0)">Run Out 0</button>
<button onclick="runOut(1)">Run Out 1</button>
<button onclick="runOut(2)">Run Out 2</button>

    <button onclick="undoLastBall()">Undo</button>
<script>

let runs = 0;
let wickets = 0;
let balls = 0;
let history = [];

function updateScore(){
    document.getElementById("score").innerHTML = runs + "/" + wickets;

    let over = Math.floor(balls / 6);
    let ball = balls % 6;

    document.getElementById("overs").innerHTML = over + "." + ball;
}

function addRun(run){

    history.push([runs, wickets, balls]);

    runs += run;
    balls++;

    updateScore();
}

function dotBall(){

    history.push([runs, wickets, balls]);

    balls++;

    updateScore();
}
function wideBall(){

    history.push([runs, wickets, balls]);

    runs++;

    updateScore();
}
function noBall(){

    history.push([runs, wickets, balls]);

    runs++;

    updateScore();
}
function wicket(){

    history.push([runs, wickets, balls]);

    wickets++;
    balls++;

    updateScore();
}
function undoLastBall(){

    if(history.length > 0){

        let last = history.pop();

        runs = last[0];
        wickets = last[1];
        balls = last[2];

        updateScore();
    }
}
}

function runOut(runScored){

    history.push([runs, wickets, balls]);

    runs += runScored;
    wickets++;
    balls++;

    updateScore();
}
function resetMatch(){
    runs = 0;
    wickets = 0;
    balls = 0;
    updateScore();
}

</script>

</body>
</html>
